document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ure<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"margin:0;font-family:'Shippori Mincho B1',serif;font-weight:800;line-height:.92;font-size:clamp(56px,9.4vw,138px);color:#f6efe3;letter-spacing:.02em;text-shadow:0 6px 40px rgba(0,0,0,.6);opacity:0;transform:translateY(26px);transition:opacity 1.1s cubic-bezier(.2,.7,.2,1),transform 1.1s cubic-bezier(.2,.7,.2,1)\" data-reveal=\"1\" data-reveal-delay=\"180\">YÛTO<br><span style=\"color:#e11d2a;text-shadow:0 0 38px rgba(225,29,42,.55),0 6px 40px rgba(0,0,0,.6)\">UCHIHA<\u002Fspan><\u002Fh1>\n    <p style=\"margin:30px 0 0;max-width:560px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(20px,2.4vw,27px);line-height:1.45;color:#e7d9d2;opacity:0;transform:translateY(22px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\" data-reveal=\"1\" data-reveal-delay=\"340\">« Un ninja doit faire preuve de maîtrise et de sang-froid. »<\u002Fp>\n    <div style=\"display:flex;align-items:center;gap:22px;margin-top:38px;flex-wrap:wrap;opacity:0;transform:translateY(22px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\" data-reveal=\"1\" data-reveal-delay=\"460\">\n      <span style=\"font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:#b8ada1\">Clan Uchiha<\u002Fspan>\n      <span style=\"width:5px;height:5px;background:#b3122a;border-radius:50%;transform:rotate(45deg)\"><\u002Fspan>\n      <span style=\"font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:#b8ada1\">Serveur Yûgen — Naruto RP<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute;left:50%;bottom:30px;transform:translateX(-50%);z-index:6;display:flex;flex-direction:column;align-items:center;gap:9px\">\n    <span style=\"font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:#8d8075\">Défiler<\u002Fspan>\n    <span style=\"font-size:18px;color:#e11d2a;animation:scCue 1.8s ease-in-out infinite\">↓<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 01 PRÉSENTATION HRP ===================== -->\n<section data-screen-label=\"Présentation HRP\" style=\"position:relative;padding:130px 56px;background:linear-gradient(180deg,#0c0a09,#100c0b)\">\n  <span style=\"position:absolute;top:64px;right:30px;font-family:'Shippori Mincho B1',serif;font-size:clamp(90px,16vw,200px);color:#fff;opacity:.035;line-height:.8;pointer-events:none;user-select:none\">紹介<\u002Fspan>\n  <div style=\"max-width:1080px;margin:0 auto;position:relative\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n      <div style=\"display:flex;align-items:center;gap:15px;margin-bottom:14px\">\n        <span style=\"font-family:'Shippori Mincho B1',serif;color:#e11d2a;font-size:15px;letter-spacing:.1em\">01<\u002Fspan>\n        <span style=\"width:38px;height:1px;background:#5a2a2e\"><\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:#8d8075\">Hors RP<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"margin:0 0 30px;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:clamp(34px,5vw,60px);color:#f4eee1;letter-spacing:.01em\">Présentation<\u002Fh2>\n    <\u002Fdiv>\n\n    <div data-reveal=\"1\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:44px\">\n      <div style=\"border:1px solid rgba(225,29,42,.22);background:linear-gradient(160deg,rgba(178,18,42,.10),rgba(255,255,255,.015));padding:26px 24px;border-radius:3px\">\n        <div style=\"font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#9a8f84;margin-bottom:12px\">Pseudo<\u002Fdiv>\n        <div style=\"font-family:'Shippori Mincho B1',serif;font-size:34px;color:#f4eee1\">Noa<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(225,29,42,.22);background:linear-gradient(160deg,rgba(178,18,42,.10),rgba(255,255,255,.015));padding:26px 24px;border-radius:3px\">\n        <div style=\"font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#9a8f84;margin-bottom:12px\">Âge<\u002Fdiv>\n        <div style=\"font-family:'Shippori Mincho B1',serif;font-size:34px;color:#f4eee1\">17 <span style=\"font-size:18px;color:#b8ada1\">ans<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(225,29,42,.22);background:linear-gradient(160deg,rgba(178,18,42,.10),rgba(255,255,255,.015));padding:26px 24px;border-radius:3px\">\n        <div style=\"font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#9a8f84;margin-bottom:12px\">Expérience<\u002Fdiv>\n        <div style=\"font-family:'Shippori Mincho B1',serif;font-size:34px;color:#e11d2a\">3000<span style=\"font-size:18px;color:#f4eee1\">H GMOD<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(225,29,42,.22);background:linear-gradient(160deg,rgba(178,18,42,.10),rgba(255,255,255,.015));padding:26px 24px;border-radius:3px\">\n        <div style=\"font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#9a8f84;margin-bottom:12px\">Statut<\u002Fdiv>\n        <div style=\"font-family:'Shippori Mincho B1',serif;font-size:22px;color:#f4eee1;line-height:1.25\">Joueur actif<br>&amp; investi<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-reveal=\"1\" data-reveal-delay=\"220\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);max-width:680px\">\n      <p style=\"font-size:18px;line-height:1.9;color:#c9bfb4;margin:0 0 20px\">Je m'appelle <strong style=\"color:#f4eee1;font-weight:500\">Noa<\u002Fstrong>, j'ai 17 ans. Joueur actif et investi sur le serveur <strong style=\"color:#f4eee1;font-weight:500\">Yûgen Naruto<\u002Fstrong>.<\u002Fp>\n      <p style=\"font-size:18px;line-height:1.9;color:#c9bfb4;margin:0\">J'aimerais incarner un personnage cohérent et crédible, capable de s'intégrer naturellement au sein du clan. Je possède une grande expérience en matière de rôle-play sur différents univers.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 02 MOTIVATION ===================== -->\n<section data-screen-label=\"Motivation\" style=\"position:relative;padding:130px 56px;background:#0c0a09;overflow:hidden\">\n  <span style=\"position:absolute;top:64px;left:24px;font-family:'Shippori Mincho B1',serif;font-size:clamp(90px,16vw,200px);color:#fff;opacity:.035;line-height:.8;pointer-events:none;user-select:none\">動機<\u002Fspan>\n  <div style=\"position:absolute;right:-160px;top:50%;transform:translateY(-50%);width:460px;height:520px;opacity:.06;pointer-events:none\">\n    <div style=\"position:absolute;left:50%;top:0;transform:translateX(-50%);width:380px;height:380px;border-radius:50%;background:linear-gradient(180deg,#e11d2a 0 56%,#f4eee1 56% 100%)\"><\u002Fdiv>\n    <div style=\"position:absolute;left:50%;bottom:30px;transform:translateX(-50%) rotate(45deg);width:130px;height:130px;background:#f4eee1;border-radius:58% 58% 58% 0\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"max-width:920px;margin:0 auto;position:relative\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n      <div style=\"display:flex;align-items:center;gap:15px;margin-bottom:14px\">\n        <span style=\"font-family:'Shippori Mincho B1',serif;color:#e11d2a;font-size:15px;letter-spacing:.1em\">02<\u002Fspan>\n        <span style=\"width:38px;height:1px;background:#5a2a2e\"><\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:#8d8075\">Pourquoi le clan<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"margin:0 0 40px;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:clamp(34px,5vw,60px);color:#f4eee1\">Motivation<\u002Fh2>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" data-reveal-delay=\"150\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);border-left:2px solid #b3122a;padding-left:34px\">\n      <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(22px,2.6vw,30px);line-height:1.5;color:#ecdfd8;margin:0 0 26px\">J'ai choisi le clan Uchiha car il représente parfaitement l'évolution que je souhaite donner à Yûto.<\u002Fp>\n      <p style=\"font-size:18px;line-height:1.92;color:#c9bfb4;margin:0 0 18px\">Ce clan est connu pour la force de ses liens, mais aussi pour les épreuves qu'il traverse, ce qui offre de nombreuses possibilités de développement et de profondeur au personnage.<\u002Fp>\n      <p style=\"font-size:18px;line-height:1.92;color:#c9bfb4;margin:0\">À travers Yûto, je souhaite explorer les thèmes de la <strong style=\"color:#e9b8b0;font-weight:500\">loyauté<\u002Fstrong>, du <strong style=\"color:#e9b8b0;font-weight:500\">dépassement de soi<\u002Fstrong> et de la <strong style=\"color:#e9b8b0;font-weight:500\">quête d'identité<\u002Fstrong>, tout en restant fidèle aux valeurs et à l'héritage du clan.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 03 DISPONIBILITÉS ===================== -->\n<section data-screen-label=\"Disponibilités\" style=\"position:relative;padding:130px 56px;background:linear-gradient(180deg,#100c0b,#0c0a09)\">\n  <span style=\"position:absolute;top:64px;right:30px;font-family:'Shippori Mincho B1',serif;font-size:clamp(90px,16vw,200px);color:#fff;opacity:.035;line-height:.8;pointer-events:none;user-select:none\">時間<\u002Fspan>\n  <div style=\"max-width:1000px;margin:0 auto;position:relative\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n      <div style=\"display:flex;align-items:center;gap:15px;margin-bottom:14px\">\n        <span style=\"font-family:'Shippori Mincho B1',serif;color:#e11d2a;font-size:15px;letter-spacing:.1em\">03<\u002Fspan>\n        <span style=\"width:38px;height:1px;background:#5a2a2e\"><\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:#8d8075\">Présence en jeu<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"margin:0 0 36px;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:clamp(34px,5vw,60px);color:#f4eee1\">Disponibilités<\u002Fh2>\n    <\u002Fdiv>\n\n    <div data-reveal=\"1\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-bottom:30px;flex-wrap:wrap\">\n        <span style=\"font-family:'Shippori Mincho B1',serif;font-size:clamp(48px,8vw,90px);color:#e11d2a;line-height:1;text-shadow:0 0 30px rgba(225,29,42,.4)\">15H<\u002Fspan>\n        <span style=\"font-size:30px;color:#6f655c\">—<\u002Fspan>\n        <span style=\"font-family:'Shippori Mincho B1',serif;font-size:clamp(48px,8vw,90px);color:#f4eee1;line-height:1\">00H<\u002Fspan>\n        <span style=\"font-size:14px;color:#9a8f84;letter-spacing:.15em;margin-left:6px\">/ tous les jours<\u002Fspan>\n      <\u002Fdiv>\n      <div data-hours=\"1\" style=\"display:flex;gap:3px;height:54px;margin-bottom:14px\"><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;font-size:11px;color:#6f655c;letter-spacing:.1em;margin-bottom:34px\"><span>00h<\u002Fspan><span>06h<\u002Fspan><span>12h<\u002Fspan><span>18h<\u002Fspan><span>00h<\u002Fspan><\u002Fdiv>\n      <p style=\"font-size:18px;line-height:1.9;color:#c9bfb4;max-width:680px;margin:0\">Je dispose de suffisamment de temps pour m'impliquer dans le RP, faire évoluer mon personnage et participer aux événements du clan et du village. Mes disponibilités peuvent toutefois être amenées à changer en fonction de ma vie personnelle.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 04 HISTOIRE (parchemin) ===================== -->\n<section data-screen-label=\"Histoire\" style=\"position:relative;padding:140px 56px;background:radial-gradient(120% 100% at 50% 0%,#f3ead4 0%,#e9ddc4 55%,#ddcfb0 100%);color:#2a2118;overflow:hidden\">\n  <div style=\"position:absolute;inset:0;opacity:.5;pointer-events:none;background:repeating-linear-gradient(102deg,rgba(120,90,50,.05) 0px,rgba(120,90,50,.05) 1px,transparent 1px,transparent 7px)\"><\u002Fdiv>\n  <div style=\"position:absolute;inset:14px;border:1px solid rgba(120,90,50,.35);pointer-events:none\"><\u002Fdiv>\n  <div style=\"position:absolute;inset:20px;border:1px solid rgba(120,90,50,.18);pointer-events:none\"><\u002Fdiv>\n  <span style=\"position:absolute;top:50px;right:60px;writing-mode:vertical-rl;font-family:'Shippori Mincho B1',serif;font-size:clamp(60px,9vw,118px);color:#7a0f1d;opacity:.10;line-height:1;letter-spacing:.1em;pointer-events:none\">物語<\u002Fspan>\n  <div style=\"max-width:780px;margin:0 auto;position:relative\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(30px);transition:opacity 1s ease,transform 1s ease\">\n      <div style=\"display:flex;align-items:center;gap:15px;margin-bottom:14px\">\n        <span style=\"font-family:'Shippori Mincho B1',serif;color:#a11226;font-size:15px;letter-spacing:.1em\">04<\u002Fspan>\n        <span style=\"width:38px;height:1px;background:#a98a5a\"><\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:#8a7048\">Le récit<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"margin:0 0 8px;font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(36px,5.4vw,64px);color:#241a12\">L'Histoire de Yûto<\u002Fh2>\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:42px\"><span style=\"width:60px;height:2px;background:#a11226\"><\u002Fspan><span style=\"font-family:'Shippori Mincho B1',serif;font-size:13px;color:#8a7048;letter-spacing:.3em\">9 ANS · UCHIHA<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(30px);transition:opacity 1s ease,transform 1s ease\">\n      <p style=\"font-size:19px;line-height:1.95;color:#34281c;margin:0 0 22px;text-wrap:pretty\"><span style=\"float:left;font-family:'Shippori Mincho B1',serif;font-size:78px;line-height:.78;color:#a11226;margin:6px 14px 0 0\">Y<\u002Fspan>ûto Uchiha a 9 ans et a grandi au sein du clan Uchiha, où la discipline et le sérieux occupent une place importante. Dès son plus jeune âge, il s'est démarqué des autres enfants par son tempérament calme et réfléchi. Tandis que beaucoup recherchaient la compagnie ou l'amusement, Yûto préférait passer son temps seul, à observer son environnement ou à s'entraîner dans le silence.<\u002Fp>\n      <p style=\"font-size:19px;line-height:1.95;color:#34281c;margin:0 0 22px;text-wrap:pretty\">Très tôt, Yûto a compris que la précipitation menait souvent à l'erreur. Il a donc pris l'habitude de réfléchir avant d'agir, analysant attentivement les situations et les personnes qui l'entourent. Cette façon d'être lui a donné une certaine maturité, mais l'a également éloigné des enfants de son âge, qui le trouvent parfois froid ou difficile à approcher.<\u002Fp>\n      <p style=\"font-size:19px;line-height:1.95;color:#34281c;margin:0;text-wrap:pretty\">Malgré cette distance naturelle, Yûto n'est pas insensible aux autres. Derrière son attitude réservée se cache un garçon profondément bienveillant, prêt à aider ou protéger ceux qu'il estime, même s'il exprime rarement ses sentiments. Convaincu qu'un ninja doit faire preuve de maîtrise et de sang-froid, il s'entraîne chaque jour avec rigueur, déterminé à devenir plus fort tout en restant fidèle à ses propres valeurs.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" data-reveal-delay=\"240\" style=\"opacity:0;transform:translateY(20px);transition:opacity 1s ease,transform 1s ease;display:flex;justify-content:center;margin-top:48px\">\n      <div style=\"width:34px;height:34px;position:relative;opacity:.85\"><div style=\"width:34px;height:34px;border-radius:50%;background:linear-gradient(180deg,#a11226 0 56%,#f3ead4 56% 100%);border:1px solid #7a0f1d\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 05 OBJECTIFS ===================== -->\n<section data-screen-label=\"Objectifs\" style=\"position:relative;padding:130px 56px;background:#0c0a09;overflow:hidden\">\n  <span style=\"position:absolute;top:64px;left:24px;font-family:'Shippori Mincho B1',serif;font-size:clamp(90px,16vw,200px);color:#fff;opacity:.035;line-height:.8;pointer-events:none;user-select:none\">目標<\u002Fspan>\n  <div style=\"max-width:1000px;margin:0 auto;position:relative\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n      <div style=\"display:flex;align-items:center;gap:15px;margin-bottom:14px\">\n        <span style=\"font-family:'Shippori Mincho B1',serif;color:#e11d2a;font-size:15px;letter-spacing:.1em\">05<\u002Fspan>\n        <span style=\"width:38px;height:1px;background:#5a2a2e\"><\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:#8d8075\">Le chemin de Yûto<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"margin:0 0 56px;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:clamp(34px,5vw,60px);color:#f4eee1\">Objectifs<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"position:relative;padding-left:40px\">\n      <div style=\"position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:linear-gradient(180deg,#e11d2a,#7a0f1d 60%,transparent)\"><\u002Fdiv>\n\n      <div data-reveal=\"1\" data-reveal-delay=\"80\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);position:relative;margin-bottom:44px\">\n        <div style=\"position:absolute;left:-40px;top:4px;width:20px;height:20px;border-radius:50%;background:#0c0a09;border:2px solid #e11d2a;box-shadow:0 0 14px rgba(225,29,42,.6)\"><\u002Fdiv>\n        <div style=\"font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#e11d2a;margin-bottom:10px\">Court terme<\u002Fdiv>\n        <p style=\"font-size:17.5px;line-height:1.88;color:#c9bfb4;margin:0;max-width:760px\">Yûto souhaite rejoindre une équipe ninja afin d'acquérir de l'expérience sur le terrain et développer ses capacités de communication. Son objectif est d'apprendre à coopérer efficacement avec ses camarades tout en se préparant à un futur rôle au sein de la diplomatie du village.<\u002Fp>\n      <\u002Fdiv>\n\n      <div data-reveal=\"1\" data-reveal-delay=\"160\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);position:relative;margin-bottom:44px\">\n        <div style=\"position:absolute;left:-40px;top:4px;width:20px;height:20px;border-radius:50%;background:#0c0a09;border:2px solid #b3122a;box-shadow:0 0 14px rgba(225,29,42,.4)\"><\u002Fdiv>\n        <div style=\"font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#d88;margin-bottom:10px\">Moyen terme<\u002Fdiv>\n        <p style=\"font-size:17.5px;line-height:1.88;color:#c9bfb4;margin:0;max-width:760px\">Yûto souhaite rendre son père fier en démontrant sa détermination et en devenant un shinobi digne des attentes de sa famille. Son objectif est également d'en apprendre davantage sur l'histoire et les traditions du clan Uchiha afin de mieux comprendre son héritage et la place qu'il occupe en son sein.<\u002Fp>\n      <\u002Fdiv>\n\n      <div data-reveal=\"1\" data-reveal-delay=\"240\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);position:relative\">\n        <div style=\"position:absolute;left:-40px;top:4px;width:20px;height:20px;border-radius:50%;background:#0c0a09;border:2px solid #7a4a30;box-shadow:0 0 10px rgba(176,137,72,.35)\"><\u002Fdiv>\n        <div style=\"font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#b8967a;margin-bottom:10px\">Long terme<\u002Fdiv>\n        <p style=\"font-size:17.5px;line-height:1.88;color:#c9bfb4;margin:0;max-width:760px\">Yûto souhaite concilier les idéaux du clan Uchiha avec ceux de son village afin de contribuer à un avenir plus stable et harmonieux. Son objectif est de devenir un acteur du dialogue entre les différentes factions et de participer au maintien de la paix au sein du monde ninja.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 06 CARACTÈRE ===================== -->\n<section data-screen-label=\"Caractère\" style=\"position:relative;padding:130px 56px;background:linear-gradient(180deg,#0c0a09,#130d0c)\">\n  <span style=\"position:absolute;top:64px;right:30px;font-family:'Shippori Mincho B1',serif;font-size:clamp(90px,16vw,200px);color:#fff;opacity:.035;line-height:.8;pointer-events:none;user-select:none\">性格<\u002Fspan>\n  <div style=\"max-width:1080px;margin:0 auto;position:relative\">\n    <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n      <div style=\"display:flex;align-items:center;gap:15px;margin-bottom:14px\">\n        <span style=\"font-family:'Shippori Mincho B1',serif;color:#e11d2a;font-size:15px;letter-spacing:.1em\">06<\u002Fspan>\n        <span sxtyle=\"width:38px;height:1px;background:#5a2a2e\"><\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:#8d8075\">Fiche personnage<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"margin:0 0 44px;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:clamp(34px,5vw,60px);color:#f4eee1\">Caractère de Yûto<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:340px 1fr;gap:44px;align-items:start\">\n      <div data-reveal=\"1\" data-reveal-delay=\"100\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n        <div style=\"position:relative;border:1px solid rgba(225,29,42,.28);padding:10px;background:rgba(178,18,42,.06)\">\n          <img src=\"https://cdn.discordapp.com/attachments/1515884180565659658/1519744293630116053/image.png?ex=6a3eabab&is=6a3d5a2b&hm=18026522de9dc7b1e63fda9e5148815ed197be7374d51ce500f9da4d12eddb2e\" alt=\"Portrait de Yûto\" style=\"width:100%;height:420px;display:block;object-fit:cover;\" />\n          <div style=\"position:absolute;top:0;left:0;width:18px;height:18px;border-top:2px solid #e11d2a;border-left:2px solid #e11d2a\"><\u002Fdiv>\n          <div style=\"position:absolute;bottom:0;right:0;width:18px;height:18px;border-bottom:2px solid #e11d2a;border-right:2px solid #e11d2a\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding:0 4px\">\n          <span style=\"font-family:'Shippori Mincho B1',serif;font-size:22px;color:#f4eee1\">宇智波 結斗<\u002Fspan>\n          <span style=\"font-size:12px;letter-spacing:.2em;color:#9a8f84\">YÛTO UCHIHA<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div data-reveal=\"1\" data-reveal-delay=\"160\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n          <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:24px;line-height:1.5;color:#ecdfd8;margin:0 0 14px\">Un enfant calme, mature et posé, bien au-delà de son âge — une aura tranquille, légèrement mélancolique, et une fierté silencieuse et intérieure.<\u002Fp>\n          <p style=\"font-size:16.5px;line-height:1.85;color:#c9bfb4;margin:0 0 34px\">Il est distant, non par mépris, mais parce qu'il se sent souvent différent des autres enfants. Il parle peu, d'une voix calme et posée. Il observe beaucoup et réfléchit avant d'agir.<\u002Fp>\n        <\u002Fdiv>\n\n        <div data-reveal=\"1\" data-reveal-delay=\"220\" style=\"opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px\">\n          <div style=\"border:1px solid rgba(255,255,255,.08);border-left:2px solid #e11d2a;padding:18px 20px;background:rgba(255,255,255,.015);transition:transform .35s ease,background .35s ease\" style-hover=\"transform:translateY(-4px);background:rgba(178,18,42,.10)\">\n            <div style=\"font-family:'Shippori Mincho B1',serif;font-size:18px;color:#f4eee1;margin-bottom:6px\">Serein &amp; stoïque<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.6;color:#a89e93\">Il garde son calme en presque toutes circonstances.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid rgba(255,255,255,.08);border-left:2px solid #e11d2a;padding:18px 20px;background:rgba(255,255,255,.015);transition:transform .35s ease,background .35s ease\" style-hover=\"transform:translateY(-4px);background:rgba(178,18,42,.10)\">\n            <div style=\"font-family:'Shippori Mincho B1',serif;font-size:18px;color:#f4eee1;margin-bottom:6px\">Mature<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.6;color:#a89e93\">Il comprend déjà des choses que les enfants de son âge ignorent.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid rgba(255,255,255,.08);border-left:2px solid #e11d2a;padding:18px 20px;background:rgba(255,255,255,.015);transition:transform .35s ease,background .35s ease\" style-hover=\"transform:translateY(-4px);background:rgba(178,18,42,.10)\">\n            <div style=\"font-family:'Shippori Mincho B1',serif;font-size:18px;color:#f4eee1;margin-bottom:6px\">Gentil dans le fond<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.6;color:#a89e93\">Une grande douceur et une volonté de protéger, rarement montrées.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid rgba(255,255,255,.08);border-left:2px solid #e11d2a;padding:18px 20px;background:rgba(255,255,255,.015);transition:transform .35s ease,background .35s ease\" style-hover=\"transform:translateY(-4px);background:rgba(178,18,42,.10)\">\n            <div style=\"font-family:'Shippori Mincho B1',serif;font-size:18px;color:#f4eee1;margin-bottom:6px\">Distant<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.6;color:#a89e93\">Il ne se lie pas facilement ; poli, mais à distance naturelle.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid rgba(255,255,255,.08);border-left:2px solid #e11d2a;padding:18px 20px;background:rgba(255,255,255,.015);transition:transform .35s ease,background .35s ease\" style-hover=\"transform:translateY(-4px);background:rgba(178,18,42,.10)\">\n            <div style=\"font-family:'Shippori Mincho B1',serif;font-size:18px;color:#f4eee1;margin-bottom:6px\">Introspectif<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.6;color:#a89e93\">Il aime la solitude, s'entraîne seul ou observe en silence.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid rgba(255,255,255,.08);border-left:2px solid #e11d2a;padding:18px 20px;background:rgba(255,255,255,.015);transition:transform .35s ease,background .35s ease\" style-hover=\"transform:translateY(-4px);background:rgba(178,18,42,.10)\">\n            <div style=\"font-family:'Shippori Mincho B1',serif;font-size:18px;color:#f4eee1;margin-bottom:6px\">Déterminé<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.6;color:#a89e93\">Il s'entraîne avec discipline et sérieux pour devenir plus fort.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== CLOSING ===================== -->\n<section data-screen-label=\"Fin\" style=\"position:relative;padding:150px 56px 120px;background:radial-gradient(circle at 50% 30%,#1a0d0d 0%,#0c0a09 62%);text-align:center;overflow:hidden\">\n  <canvas id=\"embers2\" style=\"position:absolute;inset:0;z-index:0;pointer-events:none\"><\u002Fcanvas>\n  <div data-reveal=\"1\" style=\"opacity:0;transform:translateY(30px);transition:opacity 1s ease,transform 1s ease;position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:40px\">\n    <div style=\"font-size:24px;width:10em;height:10em;border-radius:50%;position:relative;background:radial-gradient(circle at 50% 50%,#ff3a48 0%,#e11d2a 26%,#b3122a 56%,#7a0f1d 78%,#3d0a12 100%);border:.2em solid #060507;animation:scGlow 2.6s ease-in-out infinite\">\n      <div style=\"position:absolute;inset:18%;border-radius:50%;border:.07em solid rgba(0,0,0,.55)\"><\u002Fdiv>\n      <div style=\"position:absolute;inset:0;animation:scSpin 9s linear infinite\">\n        <div style=\"position:absolute;top:.55em;left:50%;width:2.1em;height:2.1em;margin-left:-1.05em;transform-origin:1.05em 4.45em;transform:rotate(0deg)\"><div style=\"width:100%;height:100%;background:#060507;border-radius:58% 58% 58% 0;transform:rotate(38deg)\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"position:absolute;top:.55em;left:50%;width:2.1em;height:2.1em;margin-left:-1.05em;transform-origin:1.05em 4.45em;transform:rotate(120deg)\"><div style=\"width:100%;height:100%;background:#060507;border-radius:58% 58% 58% 0;transform:rotate(38deg)\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"position:absolute;top:.55em;left:50%;width:2.1em;height:2.1em;margin-left:-1.05em;transform-origin:1.05em 4.45em;transform:rotate(240deg)\"><div style=\"width:100%;height:100%;background:#060507;border-radius:58% 58% 58% 0;transform:rotate(38deg)\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;top:50%;left:50%;width:1.7em;height:1.7em;margin:-.85em 0 0 -.85em;border-radius:50%;background:radial-gradient(circle at 40% 35%,#241015,#060507 70%)\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(22px,3vw,32px);color:#ecdfd8;margin:0 0 10px\">« Merci d'avoir lu ma candidature. »<\u002Fp>\n      <p style=\"font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:#9a8f84;margin:0\">Noa — pour rejoindre le clan Uchiha<\u002Fp>\n    <\u002Fdiv>\n    <span style=\"font-family:'Shippori Mincho B1',serif;letter-spacing:.6em;font-size:13px;color:#7a6258;padding-left:.6em\">一族の名のもとに<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { intro: true, introOpacity: 1 };\n\n  dismissIntro = () => {\n    if (this._dismissed) return;\n    this._dismissed = true;\n    this.setState({ introOpacity: 0 });\n    setTimeout(() => this.setState({ intro: false }), 820);\n  };\n\n  componentDidMount() {\n    this._onIntent = () => this.dismissIntro();\n    window.addEventListener('wheel', this._onIntent, { passive: true });\n    window.addEventListener('touchmove', this._onIntent, { passive: true });\n    window.addEventListener('keydown', this._onIntent);\n    requestAnimationFrame(() => {\n      this.buildHours();\n      this.initReveal();\n      this.initProgress();\n      this.initEmbers('embers');\n      this.initEmbers('embers2');\n    });\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('wheel', this._onIntent);\n    window.removeEventListener('touchmove', this._onIntent);\n    window.removeEventListener('keydown', this._onIntent);\n    (this._rafs || []).forEach(r => cancelAnimationFrame(r));\n    window.removeEventListener('scroll', this._onScroll);\n    window.removeEventListener('resize', this._onResize);\n    if (this._io) this._io.disconnect();\n  }\n\n  buildHours() {\n    const host = document.querySelector('[data-hours]');\n    if (!host || host.childElementCount) return;\n    for (let h = 0; h < 24; h++) {\n      const active = h >= 15; // 15h -> 00h (minuit)\n      const cell = document.createElement('div');\n      cell.style.cssText =\n        'flex:1;border-radius:2px;transition:all .6s cubic-bezier(.2,.7,.2,1);transform:scaleY(.4);transform-origin:bottom;opacity:.5;' +\n        (active\n          ? 'background:linear-gradient(180deg,#ff5a3c,#e11d2a 55%,#7a0f1d);box-shadow:0 0 12px rgba(225,29,42,.45)'\n          : 'background:#241c1a');\n      host.appendChild(cell);\n    }\n    // animate the bars when the section scrolls in\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          [...host.children].forEach((c, i) => {\n            setTimeout(() => { c.style.transform = 'scaleY(1)'; c.style.opacity = c.style.background.includes('241c1a') ? '.55' : '1'; }, i * 28);\n          });\n          io.unobserve(host);\n        }\n      });\n    }, { threshold: 0.4 });\n    io.observe(host);\n  }\n\n  initReveal() {\n    const els = [...document.querySelectorAll('[data-reveal]')];\n    const reveal = (el, instant) => {\n      if (instant) el.style.transition = 'none';\n      else el.style.transitionDelay = (parseInt(el.getAttribute('data-reveal-delay') || '0', 10)) + 'ms';\n      el.style.opacity = '1';\n      el.style.transform = 'none';\n    };\n    const inView = (el) => { const r = el.getBoundingClientRect(); const vh = window.innerHeight || 800; return r.top < vh * 0.96 && r.bottom > 0; };\n    // already-visible content (hero) reveals instantly so it never depends on a\n    // transition resolving — robust even when the paint/animation clock is frozen\n    els.forEach(el => { if (inView(el)) reveal(el, true); });\n    if (!('IntersectionObserver' in window)) { els.forEach(el => reveal(el, true)); return; }\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach(e => { if (e.isIntersecting) { reveal(e.target, false); this._io.unobserve(e.target); } });\n    }, { threshold: 0.16, rootMargin: '0px 0px -8% 0px' });\n    els.forEach(el => { if (!inView(el)) this._io.observe(el); });\n    setTimeout(() => els.forEach(el => { if (inView(el)) reveal(el, true); }), 1100);\n  }\n\n  initProgress() {\n    const bar = document.querySelector('[data-progress]');\n    if (!bar) return;\n    this._onScroll = () => {\n      const h = document.documentElement;\n      const max = (h.scrollHeight - h.clientHeight) || 1;\n      bar.style.width = Math.min(100, (h.scrollTop / max) * 100) + '%';\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n\n  initEmbers(id) {\n    const canvas = document.getElementById(id);\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d');\n    const parent = canvas.parentElement;\n    let W = 0, H = 0, dpr = Math.min(2, window.devicePixelRatio || 1);\n    let parts = [];\n    const colors = ['#ff6a3c', '#ff3a2a', '#e11d2a', '#ffb066', '#b3122a'];\n\n    const resize = () => {\n      const r = parent.getBoundingClientRect();\n      W = r.width; H = r.height;\n      canvas.width = W * dpr; canvas.height = H * dpr;\n      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      const target = Math.max(26, Math.floor(W / 26));\n      parts = [];\n      for (let i = 0; i < target; i++) parts.push(spawn(true));\n    };\n    const spawn = (rand) => ({\n      x: Math.random() * W,\n      y: rand ? Math.random() * H : H + 10,\n      r: Math.random() * 2.1 + 0.7,\n      vy: Math.random() * 0.55 + 0.28,\n      vx: (Math.random() - 0.5) * 0.4,\n      life: 0,\n      maxLife: Math.random() * 280 + 160,\n      c: colors[(Math.random() * colors.length) | 0],\n      drift: Math.random() * Math.PI * 2\n    });\n\n    this._onResize = this._onResize || (() => {});\n    const prev = this._onResize;\n    this._onResize = () => { prev(); resize(); };\n    window.addEventListener('resize', this._onResize, { passive: true });\n    resize();\n\n    const tick = () => {\n      ctx.clearRect(0, 0, W, H);\n      ctx.globalCompositeOperation = 'lighter';\n      for (const p of parts) {\n        p.life++;\n        p.drift += 0.02;\n        p.y -= p.vy;\n        p.x += p.vx + Math.sin(p.drift) * 0.3;\n        const t = p.life / p.maxLife;\n        const alpha = t < 0.15 ? t / 0.15 : (1 - t);\n        if (p.life >= p.maxLife || p.y < -10) Object.assign(p, spawn(false));\n        ctx.beginPath();\n        ctx.fillStyle = p.c;\n        ctx.globalAlpha = Math.max(0, alpha) * 0.85;\n        ctx.shadowBlur = 8; ctx.shadowColor = p.c;\n        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);\n        ctx.fill();\n      }\n      ctx.globalAlpha = 1; ctx.shadowBlur = 0;\n      ctx.globalCompositeOperation = 'source-over';\n      const raf = requestAnimationFrame(tick);\n      this._rafs = this._rafs || [];\n      this._rafs[id === 'embers' ? 0 : 1] = raf;\n    };\n    tick();\n  }\n\n  renderVals() {\n    return { intro: this.state.intro, introOpacity: this.state.introOpacity, dismissIntro: this.dismissIntro };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
