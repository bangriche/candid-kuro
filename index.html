document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

s à l'art des marionnettes qui ont fait la renommée du clan depuis des générations, Hinako met la main sur un carnet plus ancien que les autres — écriture différente, encre presque effacée. Il y est question d'une pratique médicale oubliée : l'usage de la bave d'une espèce particulière de limace, aux propriétés cicatrisantes remarquables, employée par les tout premiers Shirogane, bien avant que le clan ne se spécialise dans le <em style=\"font-style:italic;color:#E8B27A;\">kugutsu<\u002Fem> — l'art des marionnettes.<\u002Fp>\n          <p style=\"font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.95;color:#D6CBAF;margin:0 0 1.05em;\">Fraîchement intégrée au corps médical, Hinako y voit une opportunité : renouer avec cette part oubliée de son héritage, et peut-être moderniser cette vieille pratique grâce aux compétences propres à son clan.<\u002Fp>\n          <p style=\"font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.95;color:#D6CBAF;margin:0;\">Elle se met en tête de retrouver l'espèce décrite dans le carnet, et de constituer son propre élevage.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"260\" style=\"opacity:0;transform:translateY(40px);transition:transform 1s cubic-bezier(.2,.7,.15,1);flex:1 1 380px;min-width:min(100%,300px);\">\n        <div style=\"position:relative;padding:14px;background:linear-gradient(150deg,#EAE0C6,#DFD1AF);border-radius:8px;box-shadow:0 34px 66px -34px #000, 0 0 0 1px rgba(20,17,13,.55), inset 0 0 0 1px rgba(255,255,255,.35);\">\n          <span style=\"position:absolute;top:7px;left:7px;width:14px;height:14px;border-top:2px solid #E8731C;border-left:2px solid #E8731C;\"><\u002Fspan>\n          <span style=\"position:absolute;top:7px;right:7px;width:14px;height:14px;border-top:2px solid #E8731C;border-right:2px solid #E8731C;\"><\u002Fspan>\n          <span style=\"position:absolute;bottom:7px;left:7px;width:14px;he lor:rgba(232,115,28,.05);z-index:0;pointer-events:none;user-select:none;\">印<\u002Fdiv>\n    <div style=\"position:relative;z-index:2;width:100%;max-width:1120px;margin:0 auto;\">\n      <div style=\"display:flex;gap:clamp(32px,4.5vw,72px);align-items:center;flex-wrap:wrap;\">\n        <div style=\"flex:1 1 440px;min-width:min(100%,340px);\">\n          <div data-reveal=\"\" style=\"opacity:0;transform:translateY(40px);transition:transform .95s cubic-bezier(.2,.7,.15,1);\">\n            <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:8px;\">\n              <span style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(46px,7vw,104px);line-height:.8;color:rgba(237,227,204,.07);\">04<\u002Fspan>\n              <div>\n                <div style=\"font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#E8731C;margin-bottom:8px;\">Étape IV<\u002Fdiv>\n                <span style=\"display:inline-flex;align-items:center;gap:8px;font-family:'Zen Kaku Gothic New',sans-serif;font-weight:500;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#E8B27A;border:1px solid rgba(232,115,28,.4);border-radius:999px;padding:5px 12px;\">Roll 100 · <span id=\"roll-max-4\">10<\u002Fspan> lancers/jour<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <h2 style=\"font-family:'Shippori Mincho B1','Shippori Mincho',serif;font-weight:800;font-size:clamp(30px,4.6vw,58px);line-height:1.1;letter-spacing:-.01em;color:#F3EAD4;margin:6px 0 0;text-wrap:balance;\">L'Entraînement du Sceau Ancestral<\u002Fh2>\n            <span data-reveal=\"sweep\" data-reveal-delay=\"220\" style=\"display:block;height:4px;width:clamp(72px,9vw,120px);margin-top:20px;background:linear-gradient(90deg,#E8731C,rgba(232,115,28,0));border-radius:2px;transform:scaleX(0);transform-origin:left;transition:transform 1.1s cubic-bezier(.2,.7,.15,1);\"><\u002Fspan>\n          <\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"140\" style=\"opacity:0;transform:translateY(40px);transition:transform .95s cubic-bezier(.2,.7,.15,1);margin-top:26px;\">\n            <p style=\"font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.95;color:#D6CBAF;margin:0 0 1.05em;\">Le carnet familial contient, en marge d'une page, une séquence de sceaux incomplète, accompagnée d'une note laconique : <em style=\"font-style:italic;color:#E8B27A;\">« technique de rappel, sans objet sans pacte »<\u002Fem>. Rien n'indique clairement de quoi il s'agit, mais la séquence ressemble fortement à un kuchiyose.<\u002Fp>\n            <p style=\"font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.95;color:#D6CBAF;margin:0 0 1.05em;\">Dans le calme du dojo du clan, seule, Hinako s'entraîne à reproduire cette séquence de mémoire, en y intégrant — presque par intuition — une trace de la sécrétion de Shizuku comme composant du rituel. Aucun enjeu vital, aucune urgence : juste de la pratique répétée, jusqu'à la maîtrise technique complète du geste.<\u002Fp>\n            <p style=\"font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.95;color:#D6CBAF;margin:0;\">Ce roll représente cette maîtrise progressive.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-reveal-delay=\"260\" style=\"opacity:0;transform:translateY(40px);transition:transform 1s cubic-bezier(.2,.7,.15,1);flex:1 1 380px;min-width:min(100%,300px);\">\n          <div style=\"position:relative;padding:14px;background:linear-gradient(150deg,#EAE0C6,#DFD1AF);border-radius:8px;box-shadow:0 34px 66px -34px #000, 0 0 0 1px rgba(20,17,13,.55), inset 0 0 0 1px rgba(255,255,255,.35);\">\n            <span style=\"position:absolute;top:7px;left:7px;width:14px;height:14px;border-top:2px solid #E8731C;border-left:2px solid #E8731C;\"><\u002Fspan>\n            <span style=\"position:absolute;top:7px;right:7px;width:14px;height:14px;border-top:2px solid #E8731C;border-right:2px solid #E8731C;\"><\u002Fspan>\n            <span style=\"position:absolute;bottom:7px;left:7px;width:14px;height:14px;border-bottom:2px solid #E8731C;border-left:2px solid #E8731C;\"><\u002Fspan>\n            <span style=\"position:absolute;bottom:7px;right:7px;width:14px;height:14px;border-bottom:2px solid #E8731C;border-right:2px solid #E8731C;\"><\u002Fspan>\n            <div style=\"position:relative;height:clamp(260px,44vh,440px);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(20,17,13,.4);\">\n              <img id=\"img-etape4\" src=\"https://cdn.discordapp.com/attachments/1304486260961837128/1522352205229850726/ChatGPT_Image_2_juil._2026_a_23_22_32.png?ex=6a482879&is=6a46d6f9&hm=f18300cc25e404eccf0abffe5ef7e1679fb1f2d39fde6ee0ed5908538e22ae2c&\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n            <\u002Fdiv>\n            <div style=\"margin-top:11px;display:flex;justify-content:space-between;align-items:center;font-family:'Zen Kaku Gothic New',sans-serif;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#7a6a4a;\">\n              <span>◈ Illustration<\u002Fspan><span style=\"font-family:'Yuji Syuku',serif;font-size:15px;letter-spacing:0;\">印<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ETAPE 5 — MARAIS D'ARGENT ============ -->\n  <section id=\"etape-5\" data-chapter=\"\" data-accent=\"silver\" data-screen-label=\"Étape 05\" style=\"position:relative;min-height:100vh;display:flex;align-items:center;padding:clamp(96px,13vh,150px) clamp(26px,6vw,90px) clamp(80px,11vh,140px) clamp(72px,8vw,120px);box-sizing:border-box;overflow:hidden;background:linear-gradient(180deg, rgba(62,107,110,.10), rgba(20,17,13,0) 40%);\">\n    <div data-kanji-el=\"\" data-parallax=\"\" data-speed=\"-0.05\" aria-hidden=\"true\" style=\"position:absolute;right:clamp(-40px,-1vw,10px);top:8%;font-family:'Yuji Syuku',serif;font-size:min(52vh,560px);line-height:1;color:rgba(175,197,201,.06);z-index:0;pointer-events:none;user-select:none;\">召<\u002Fdiv>\n    <div style=\"position:relative;z-index:2;width:100%;max-width:1080px;margin:0 auto;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(40px);transition:transform .95s cubic-bezier(.2,.7,.15,1);text-align:center;max-width:760px;margin:0 auto;\">\n        <div style=\"display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px;\">\n          <span style=\"font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#A9C5C9;\">Étape V<\u002Fspan>\n          <span style=\"width:5px;height:5px;border-radius:50%;background:#A9C5C9;\"><\u002Fspan>\n          <span style=\"font-family:'Zen Kaku Gothic New',sans-serif;font-weight:500;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#9fbabd;\">Scène RP scénarisée · sans roll<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Shippori Mincho B1','Shippori Mincho',serif;font-weight:800;font-size:clamp(30px,4.8vw,60px);line-height:1.08;letter-spacing:-.01em;color:#EAF1F2;margin:0;text-wrap:balance;\">Le Déclenchement<br>&amp; Les Marais d'Argent<\u002Fh2>\n        <span data-reveal=\"sweep\" data-reveal-delay=\"220\" style=\"display:block;height:4px;width:clamp(90px,12vw,150px);margin:22px auto 0;background:linear-gradient(90deg,rgba(175,197,201,0),#A9C5C9,rgba(175,197,201,0));border-radius:2px;transform:scaleX(0);transition:transform 1.1s cubic-bezier(.2,.7,.15,1);\"><\u002Fspan>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(40px);transition:transform 1s cubic-bezier(.2,.7,.15,1);margin-top:34px;\">\n        <div style=\"position:relative;padding:14px;background:linear-gradient(150deg,#E4ECEC,#CDDBDB);border-radius:8px;box-shadow:0 40px 80px -40px #000, 0 0 0 1px rgba(20,17,13,.5), inset 0 0 0 1px rgba(255,255,255,.5);\">\n          <span style=\"position:absolute;top:7px;left:7px;width:14px;height:14px;border-top:2px solid #6f9498;border-left:2px solid #6f9498;\"><\u002Fspan>\n          <span style=\"position:absolute;top:7px;right:7px;width:14px;height:14px;border-top:2px solid #6f9498;border-right:2px solid #6f9498;\"><\u002Fspan>\n          <span style=\"position:absolute;bottom:7px;left:7px;width:14px;height:14px;border-bottom:2px solid #6f9498;border-left:2px solid #6f9498;\"><\u002Fspan>\n          <span style=\"position:absolute;bottom:7px;right:7px;width:14px;height:14px;border-bottom:2px solid #6f9498;border-right:2px solid #6f9498;\"><\u002Fspan>\n          <div style=\"position:relative;height:clamp(320px,52vh,560px);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(20,40,42,.35);\">\n            <img id=\"img-marais\" src=\"https://cdn.discordapp.com/attachments/1304486260961837128/1522352206530089171/etape5.png?ex=6a482879&is=6a46d6f9&hm=7af4ffbececa9a2fb50cbfeea121bf4e5acf7b6559297c644b460bc9a76e6358&\" style=\"width:100%;height:100%;object-fit:cover;object-position:center 18%;display:block;\">\n          <\u002Fdiv>\n          <div style=\"margin-top:11px;display:flex;justify-content:space-between;align-items:center;font-family:'Zen Kaku Gothic New',sans-serif;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#5c7476;\">\n            <span>◈ Les Marais d'Argent<\u002Fspan><span style=\"font-family:'Yuji Syuku',serif;font-size:15px;letter-spacing:0;\">銀<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(40px);transition:transform .95s cubic-bezier(.2,.7,.15,1);margin-top:30px;max-width:820px;margin-left:auto;margin-right:auto;\">\n        <p style=\"font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.95;color:#CBD6D6;margin:0 0 1.05em;\">La séquence enfin maîtrisée, Hinako décide de l'exécuter une dernière fois, par simple curiosité, pour voir si le sceau « prend » réellement. Le chakra qu'elle canalise se comporte différemment de d'habitude — plus dense, presque vivant, comme s'il répondait à quelque chose au-delà d'elle.<\u002Fp>\n        <p style=\"font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.95;color:#CBD6D6;margin:0 0 1.05em;\">Le sol du dojo se dérobe sous ses pieds ; elle est happée, aspirée, puis atterrit brutalement.<\u002Fp>\n        <p style=\"font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.95;color:#CBD6D6;margin:0 0 1.05em;\">Elle rouvre les yeux dans un lieu brumeux, saturé d'humidité, où la végétation dégouline d'une rosée argentée — <strong style=\"font-weight:700;color:#DCE8E8;\">les Marais d'Argent<\u002Fstrong>. Autour d'elle, plusieurs petites limaces l'observent en silence, sans hostilité, presque curieuses. Elles se mettent en mouvement, formant un sillage qu'elle comprend devoir suivre.<\u002Fp>\n        <p style=\"font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.95;color:#CBD6D6;margin:0;\">Elle est menée jusqu'à une clairière où une limace d'une taille impressionnante repose, immobile, presque endormie — jusqu'à ce qu'un œil s'ouvre lentement : <strong style=\"font-weight:700;color:#DCE8E8;\">Tsuyuhime<\u002Fstrong>, la gardienne, « princesse de rosée ».<\u002Fp>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" data-reveal-delay=\"140\" style=\"opacity:0;transform:translateY(40px);transition:transform 1s cubic-bezier(.2,.7,.15,1);margin-top:36px;display:flex;gap:clamp(24px,3.5vw,48px);align-items:center;flex-wrap:wrap;justify-content:center;\">\n        <div style=\"flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:12px;\">\n          <div style=\"position:relative;width:clamp(150px,20vw,200px);aspect-ratio:1;border-radius:50%;padding:11px;background:radial-gradient(circle,#E4ECEC,#C6D6D6);box-shadow:0 0 0 2px #6f9498, 0 24px 46px -24px #000;\">\n            <img id=\"img-tsuyuhime\" src=\"https://cdn.discordapp.com/attachments/1304486260961837128/1522356852111704104/tusuxjcqt26g1.png?ex=6a482ccd&is=6a46db4d&hm=7d638ff9466d238051b308c9b87b7f7ef81d9d8d9e25337067f6403f41dafb8e\" style=\"width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;\">\n          <\u002Fdiv>\n          <div style=\"font-family:'Yuji Syuku',serif;font-size:20px;color:#A9C5C9;letter-spacing:.08em;\">露 Tsuyuhime<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 380px;min-width:min(100%,300px);position:relative;padding:26px 30px;background:linear-gradient(160deg, rgba(62,107,110,.18), rgba(20,26,26,.4));border:1px solid rgba(175,197,201,.28);border-left:3px solid #A9C5C9;border-radius:12px;\">\n          <div style=\"position:absolute;top:14px;right:18px;font-family:'Shippori Mincho B1',serif;font-size:52px;line-height:1;color:rgba(175,197,201,.2);\">”<\u002Fdiv>\n          <p style=\"font-family:'Shippori Mincho',serif;font-style:italic;font-size:clamp(17px,2vw,23px);line-height:1.6;color:#E4EDED;margin:0 0 8px;\">« Une Shirogane... Voilà longtemps qu'aucun de ton sang n'avait retrouvé ce chemin. »<\u002Fp>\n          <div style=\"font-family:'Zen Kaku Gothic New',sans-serif;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#9fbabd;\">— Tsuyuhime, la gardienne<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" data-reveal-delay=\"160\" style=\"opacity:0;transform:translateY(40px);transition:transform .95s cubic-bezier(.2,.7,.15,1);margin-top:32px;max-width:820px;margin-left:auto;margin-right:auto;\">\n        <p style=\"font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.9;color:#CBD6D6;margin:0 0 16px;\">S'ensuit un dialogue RP libre où la gardienne interroge Hinako :<\u002Fp>\n        <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;\">\n          <li style=\"display:flex;gap:14px;align-items:flex-start;font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.7;color:#DCE8E8;\"><span style=\"font-family:'Yuji Syuku',serif;color:#A9C5C9;font-size:18px;flex:0 0 auto;line-height:1.5;\">◦<\u002Fspan>Pourquoi soigner plutôt que combattre ?<\u002Fli>\n          <li style=\"display:flex;gap:14px;align-items:flex-start;font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.7;color:#DCE8E8;\"><span style=\"font-family:'Yuji Syuku',serif;color:#A9C5C9;font-size:18px;flex:0 0 auto;line-height:1.5;\">◦<\u002Fspan>Que compte-t-elle faire de ce lien, une fois scellé ?<\u002Fli>\n          <li style=\"display:flex;gap:14px;align-items:flex-start;font-family:'Shippori Mincho',serif;font-size:clamp(15.5px,1.5vw,18px);line-height:1.7;color:#DCE8E8;\"><span style=\"font-family:'Yuji Syuku',serif;color:#A9C5C9;font-size:18px;flex:0 0 auto;line-height:1.5;\">◦<\u002Fspan>Est-elle prête à porter la responsabilité d'un pacte que son clan a laissé se perdre ?<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SIGNATURE ============ -->\n  <section id=\"signature\" data-chapter=\"\" data-accent=\"blood\" data-screen-label=\"Signature\" style=\"position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:clamp(96px,13vh,150px) clamp(26px,6vw,90px) clamp(90px,12vh,150px) clamp(72px,8vw,120px);box-sizing:border-box;overflow:hidden;background:linear-gradient(180deg, rgba(142,20,32,.08), rgba(20,17,13,0) 45%);\">\n    <div data-kanji-el=\"\" data-parallax=\"\" data-speed=\"-0.05\" data-parallax-base=\"translate(-50%,-50%)\" aria-hidden=\"true\" style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Yuji Syuku' ign({ 1: 0, 2: 0, 3: 0, 4: 0 }, p.counts || {});\n          s.last = Object.assign({ 1: null, 2: null, 3: null, 4: null }, p.last || {});\n        }\n      }\n    } catch (e) {}\n    this.rollState = s;\n  }\n\n  saveRolls() {\n    try { this.rollState.date = this.today(); localStorage.setItem('pacteLimacesRolls_v1', JSON.stringify(this.rollState)); } catch (e) {}\n  }\n\n  initDice() {\n    this.loadRolls();\n    var self = this;\n    for (var s = 1; s <= 4; s++) {\n      (function (step) {\n        var cEl = document.getElementById('roll-count-' + step);\n        if (cEl) cEl.textContent = self.rollState.counts[step];\n        var lEl = document.getElementById('roll-last-' + step);\n        if (lEl) lEl.textContent = (self.rollState.last[step] == null ? '—' : self.rollState.last[step]);\n        var nEl = document.getElementById('die-num-' + step);\n        if (nEl && self.rollState.last[step] != null) {\n          var v = self.rollState.last[step];\n          nEl.textContent = v < 10 ? ('0' + v) : ('' + v);\n        }\n        var btn = document.getElementById('roll-btn-' + step);\n        if (btn) {\n          var fn = function () { self.rollDie(step); };\n          btn.addEventListener('click', fn);\n          self._cleanup.push(function () { btn.removeEventListener('click', fn); });\n        }\n      })(s);\n    }\n  }\n\n  unlockDie(step) {\n    var btn = document.getElementById('roll-btn-' + step);\n    if (!btn || this._rollingStep === step) return;\n    btn.disabled = false;\n    btn.textContent = 'Lancer le d100';\n    btn.style.background = 'linear-gradient(180deg,#F59A3E,#E8731C)';\n    btn.style.color = '#14110D';\n    btn.style.boxShadow = '0 8px 20px -8px rgba(232,115,28,.8)';\n    btn.style.cursor = 'pointer';\n    btn.style.opacity = '1';\n  }\n\n  lockDie(step) {\n    var btn = document.getElementById('roll-btn-' + step);\n    if (!btn) return;\n    btn.disabled = true;\n    btn.textContent = 'Limite du jour atteinte';\n    btn.style.background = 'linear-gradient(180deg,#3a2f22,#2a2118)';\n    btn.style.color = '#8a7d63';\n    btn.style.boxShadow = 'none';\n    btn.style.cursor = 'default';\n    btn.style.opacity = '1';\n  }\n\n  rollDie(step) {\n    if (!this.rollState) return;\n    if (this.rollState.counts[step] >= this.limit) return;\n    if (this._rollingStep) return;\n    var numEl = document.getElementById('die-num-' + step);\n    if (!numEl) return;\n    this._rollingStep = step;\n    var btn = document.getElementById('roll-btn-' + step);\n    var dieEl = document.querySelector('[data-die=\"' + step + '\"]');\n    var burst = document.querySelector('[data-burst=\"' + step + '\"]');\n    if (btn) { btn.disabled = true; btn.style.opacity = '.7'; btn.style.cursor = 'default'; }\n    var self = this;\n    var fmt = function (v) { return v < 10 ? ('0' + v) : ('' + v); };\n    var final = 1 + Math.floor(Math.random() * 100);\n\n    var finish = function () {\n      numEl.textContent = fmt(final);\n      if (dieEl && !self.reduced) { dieEl.style.animation = 'dieShake .5s'; setTimeout(function () { dieEl.style.animation = ''; }, 520); }\n      if (burst && !self.reduced) { burst.style.animation = 'none'; void burst.offsetWidth; burst.style.animation = 'burstRing .6s ease-out'; }\n      self.rollState.counts[step]++;\n      self.rollState.last[step] = final;\n      self.saveRolls();\n      var cEl = document.getElementById('roll-count-' + step); if (cEl) cEl.textContent = self.rollState.counts[step];\n      var lEl = document.getElementById('roll-last-' + step); if (lEl) lEl.textContent = final;\n      var fl = document.getElementById('roll-flavor-' + step);\n      if (fl) {\n        if (final === 100) { fl.textContent = 'Réussite parfaite — 100 !'; fl.style.color = '#F6C98B'; fl.style.opacity = '1'; }\n        else if (final === 1) { fl.textContent = 'Échec critique — 1.'; fl.style.color = '#D98A93'; fl.style.opacity = '1'; }\n        else { fl.style.opacity = '0'; }\n      }\n      self._rollingStep = null;\n      if (self.rollState.counts[step] >= self.limit) self.lockDie(step);\n      else if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }\n    };\n\n    if (this.reduced) { finish(); return; }\n\n    var dur = 1050, start = performance.now();\n    var tick = function (now) {\n      var p = (now - start) / dur;\n      if (p >= 1) { finish(); return; }\n      numEl.textContent = fmt(1 + Math.floor(Math.random() * 100));\n      var delay = 40 + p * p * 130;\n      setTimeout(function () { requestAnimationFrame(tick); }, delay);\n    };\n    requestAnimationFrame(tick);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
